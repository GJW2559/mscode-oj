<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MSCODE OJ</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #f1f5f9;
			min-height: 100vh;
		}
		.login-page {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
		}
		.login-card {
			background: white;
			padding: 2rem;
			border-radius: 24px;
			width: 90%;
			max-width: 380px;
			box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
		}
		.login-card h1 { font-size: 1.8rem; margin-bottom: 1.5rem; text-align: center; color: #0f172a; }
		.login-card input {
			width: 100%;
			padding: 12px 14px;
			margin: 8px 0 16px;
			border: 1px solid #cbd5e1;
			border-radius: 14px;
			font-size: 0.95rem;
		}
		.login-card button {
			width: 100%;
			padding: 12px;
			background: #3b82f6;
			color: white;
			border: none;
			border-radius: 40px;
			font-weight: 600;
			cursor: pointer;
		}
		.msg { padding: 10px; border-radius: 12px; margin-bottom: 12px; font-size: 0.85rem; text-align: center; }
		.msg-error { background: #fee2e2; color: #991b1b; }
		.msg-success { background: #dcfce7; color: #166534; }
		.app-page { display: none; }
		.top-bar {
			background: white;
			border-bottom: 1px solid #e2e8f0;
			padding: 12px 24px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 12px;
			position: sticky;
			top: 0;
			z-index: 100;
		}
		.logo { font-size: 1.4rem; font-weight: 700; color: #2563eb; }
		.nav-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
		.nav-tab {
			padding: 6px 18px;
			border-radius: 40px;
			cursor: pointer;
			background: #f1f5f9;
			transition: 0.2s;
		}
		.nav-tab.active { background: #3b82f6; color: white; }
		.user-area { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
		.role-badge { padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: bold; color: white; }
		.role-root { background: #dc2626; }
		.role-admin { background: #f97316; }
		.role-user { background: #10b981; }
		button, .btn {
			background: #f1f5f9;
			border: 1px solid #cbd5e1;
			padding: 6px 14px;
			border-radius: 40px;
			cursor: pointer;
			transition: 0.2s;
		}
		button:hover { background: #e2e8f0; }
		.btn-primary { background: #3b82f6; border-color: #3b82f6; color: white; }
		.btn-primary:hover { background: #2563eb; }
		.btn-danger { background: #fee2e2; border-color: #fecaca; color: #dc2626; }
		.btn-sm { padding: 4px 12px; font-size: 0.75rem; }
		main { max-width: 1300px; margin: 24px auto; padding: 0 20px; }
		.card {
			background: white;
			border-radius: 24px;
			padding: 1.5rem;
			margin-bottom: 1.5rem;
			border: 1px solid #eef2ff;
		}
		.card-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 12px;
			margin-bottom: 1.2rem;
			padding-bottom: 0.8rem;
			border-bottom: 2px solid #eef2ff;
		}
		.problem-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
			gap: 1rem;
		}
		.problem-card {
			background: #fafcff;
			border: 1px solid #e2e8f0;
			border-radius: 20px;
			padding: 1rem;
		}
		.problem-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
		.answer-area { margin-top: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
		.answer-input { flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 40px; font-size: 0.85rem; }
		.result-badge { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 40px; }
		.result-correct { background: #dcfce7; color: #15803d; }
		.result-wrong { background: #fee2e2; color: #b91c1c; }
		table { width: 100%; border-collapse: collapse; }
		th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eef2ff; }
		.hidden { display: none; }
		.flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
		.search-box { padding: 8px 14px; border: 1px solid #cbd5e1; border-radius: 40px; width: 220px; }
		.drop-zone {
			border: 2px dashed #cbd5e1;
			border-radius: 20px;
			padding: 20px;
			text-align: center;
			background: #f8fafc;
			cursor: pointer;
			margin-bottom: 16px;
		}
		.drop-zone.drag-over { border-color: #3b82f6; background: #eff6ff; }
		.modal {
			display: none;
			position: fixed;
			top: 0; left: 0;
			width: 100%; height: 100%;
			background: rgba(0,0,0,0.5);
			justify-content: center;
			align-items: center;
			z-index: 1000;
		}
		.modal-content {
			background: white;
			border-radius: 28px;
			padding: 1.8rem;
			width: 90%;
			max-width: 500px;
		}
		.close { float: right; font-size: 1.6rem; cursor: pointer; }
		footer { text-align: center; padding: 20px; color: #64748b; font-size: 0.7rem; border-top: 1px solid #eef2ff; margin-top: 24px; }
		@media (max-width: 700px) { .top-bar { flex-direction: column; align-items: stretch; } }
	</style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginPage" class="login-page">
	<div class="login-card">
		<h1>📚 MSCODE OJ</h1>
		<div id="loginMsg" class="msg"></div>
		<input type="text" id="loginUsername" placeholder="用户名" >
		<input type="password" id="loginPassword" placeholder="密码">
		<button id="loginBtn">登录系统</button>
		<div style="margin-top: 1rem; font-size: 0.7rem; text-align: center; color: #5b6e8c;">
			Version 2.0
		</div>
	</div>
</div>

<!-- 主应用界面 -->
<div id="appPage" class="app-page">
	<div class="top-bar">
		<div class="logo">✍️ MSCODE OJ</div>
		<div class="nav-tabs">
			<div class="nav-tab active" data-tab="problems"> 题目列表</div>
			<div class="nav-tab admin-only" data-tab="users"> 用户管理</div>
			<div class="nav-tab admin-only" data-tab="problemMgmt"> 题目管理</div>
		</div>
		<div class="user-area">
			<span> <span id="currentUserName"></span></span>
			<span class="role-badge" id="currentRoleBadge"></span>
			<button id="changePwdBtn" class="btn-sm"> 改密</button>
			<button id="logoutBtn" class="btn-sm btn-danger"> 退出</button>
		</div>
	</div>

	<main>
		<div id="problems" class="tab-content">
			<div class="card">
				<div class="card-header">
					<span>题目列表</span>
					<div class="flex-row">
						<input type="text" id="problemSearch" class="search-box" placeholder="🔍 搜索题目">
						<span id="problemStats" style="background:#f1f5f9; padding:4px 12px; border-radius:40px;">0题</span>
						<button id="importBtn" class="btn-sm btn-primary admin-only">📥 导入题目</button>
					</div>
				</div>
				<div id="problemListContainer" class="problem-grid"></div>
			</div>
		</div>

		<div id="users" class="tab-content hidden">
			<div class="card">
				<div class="card-header">
					<span>用户管理</span>
					<div class="flex-row">
						<input type="text" id="userSearch" class="search-box" placeholder=" 搜索用户">
						<button id="addUserBtn" class="btn-sm btn-primary admin-only"> 添加用户</button>
					</div>
				</div>
				<table><thead><tr><th>用户名</th><th>角色</th><th>操作</th></tr></thead><tbody id="userTableBody"></tbody></table>
			</div>
		</div>

		<div id="problemMgmt" class="tab-content hidden">
			<div class="card">
				<div class="card-header">
					<span>题目管理</span>
					<button id="addProblemBtn" class="btn-sm btn-primary"> 添加题目</button>
				</div>
				<div id="manageProblemList"></div>
			</div>
		</div>
	</main>
	<footer>请勿使用非法</footer>
</div>

<!-- 模态框们 -->
<div id="pwdModal" class="modal"><div class="modal-content"><div class="close">&times;</div><h3>🔐 修改密码</h3><input type="password" id="newPwd" placeholder="新密码" style="width:100%; margin:15px 0"><input type="password" id="confirmPwd" placeholder="确认密码" style="width:100%"><button id="confirmPwdBtn" class="btn-primary" style="width:100%">确认修改</button></div></div>
<div id="problemModal" class="modal"><div class="modal-content"><div class="close">&times;</div><h3 id="problemModalTitle">添加题目</h3><input type="text" id="problemTitle" placeholder="题目名称" style="width:100%; margin:8px 0"><textarea id="problemDesc" rows="3" placeholder="题目描述" style="width:100%; margin:8px 0"></textarea><textarea id="problemAnswer" rows="2" placeholder="参考答案" style="width:100%; margin:8px 0"></textarea><button id="saveProblemModalBtn" class="btn-primary" style="width:100%">保存</button></div></div>
<div id="importModal" class="modal"><div class="modal-content"><div class="close">&times;</div><h3>📥 导入题目</h3><textarea id="importJson" rows="6" placeholder='{"contests":[{"title":"1+1=?","desc":"计算","answer":"2"}]}' style="width:100%"></textarea><div id="dropZone" class="drop-zone">📂 拖拽 JSON 文件到此处</div><button id="doImportBtn" class="btn-primary" style="width:100%">确认导入</button></div></div>
<div id="userModal" class="modal"><div class="modal-content"><div class="close">&times;</div><h3 id="userModalTitle">添加用户</h3><input type="text" id="newUsername" placeholder="用户名" style="width:100%; margin:8px 0"><input type="password" id="newUserPassword" placeholder="密码" style="width:100%; margin:8px 0"><select id="newUserRoleSelect" style="width:100%; margin:8px 0"><option value="user">普通用户 (user)</option><option value="admin">管理员 (admin)</option><option value="root">超级管理员 (root)</option></select><button id="saveUserModalBtn" class="btn-primary" style="width:100%">保存</button></div></div>
<div id="resetPwdModal" class="modal"><div class="modal-content"><div class="close">&times;</div><h3>重置用户密码</h3><p>用户：<span id="resetUsernameSpan"></span></p><input type="password" id="resetNewPassword" placeholder="新密码" style="width:100%; margin:12px 0"><button id="doResetPwdBtn" class="btn-primary" style="width:100%">确认重置</button></div></div>

<script>
// ======================== 配置区 ========================
const GITHUB_TOKEN = "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";      // 你的 GitHub Token（需要 repo 权限）
const REPO_NAME = "GJW2559/mscode-oj";                   // 例如 "GJW2559/mscode-oj"
// =====================================================

let currentUser = null;
let problems = [];
let users = [];
let siteTitle = "MSCODE OJ";

// GitHub API 请求（仓库内容）
async function repoRequest(endpoint, method, body = null) {
	const url = `https://api.github.com/repos/${REPO_NAME}${endpoint}`;
	const headers = {
		"Authorization": `Bearer ${GITHUB_TOKEN}`,
		"Accept": "application/vnd.github.v3+json",
		"User-Agent": "MSCODE-OJ"
	};
	const options = { method, headers };
	if (body) options.body = JSON.stringify(body);
	const res = await fetch(url, options);
	if (!res.ok) {
		const err = await res.text();
		throw new Error(`GitHub API ${res.status}: ${err.slice(0, 100)}`);
	}
	return res.json();
}

// 获取文件的 SHA（用于更新）
async function getFileSha(path) {
	try {
		const data = await repoRequest(`/contents/${path}`, "GET");
		return data.sha;
	} catch(e) { return null; }
}

// 读取文件内容
async function readRepoFile(path) {
	try {
		const data = await repoRequest(`/contents/${path}`, "GET");
		return atob(data.content);
	} catch(e) { return null; }
}

// 写入/更新文件
async function writeRepoFile(path, content, commitMsg) {
	const sha = await getFileSha(path);
	const body = {
		message: commitMsg,
		content: btoa(unescape(encodeURIComponent(content))),
		branch: "main"
	};
	if (sha) body.sha = sha;
	await repoRequest(`/contents/${path}`, "PUT", body);
}

// 初始化仓库（如果文件不存在则创建）
async function initRepo() {
	// 检查 user.json
	let usersRaw = await readRepoFile("user.json");
	if (!usersRaw) {
		await writeRepoFile("user.json", JSON.stringify([{ username: "root", password: "123456", role: "root" }]), "初始化用户数据");
		usersRaw = await readRepoFile("user.json");
	}
	users = JSON.parse(usersRaw);
	
	// 检查 contests.json
	let contestsRaw = await readRepoFile("contests.json");
	if (!contestsRaw) {
		await writeRepoFile("contests.json", JSON.stringify({ contests: [] }), "初始化题库");
		contestsRaw = await readRepoFile("contests.json");
	}
	const contestsData = JSON.parse(contestsRaw);
	problems = contestsData.contests || [];
	
	// 检查 title.txt
	let titleRaw = await readRepoFile("title.txt");
	if (!titleRaw) {
		await writeRepoFile("title.txt", "MSCODE OJ", "初始化标题");
		titleRaw = await readRepoFile("title.txt");
	}
	siteTitle = titleRaw;
}

async function saveProblems() {
	await writeRepoFile("contests.json", JSON.stringify({ contests: problems }), "更新题目");
}

async function saveUsers() {
	await writeRepoFile("user.json", JSON.stringify(users), "更新用户");
}

async function saveTitle() {
	await writeRepoFile("title.txt", siteTitle, "更新标题");
}

// 权限判断
function canManage() {
	return currentUser && (currentUser.role === 'root' || currentUser.role === 'admin');
}
function canDeleteUser(u) {
	if (!currentUser) return false;
	if (currentUser.role === 'root') return u.username !== 'root';
	if (currentUser.role === 'admin') return u.role !== 'root' && u.role !== 'admin';
	return false;
}

// 渲染
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m;}); }

function renderProblems() {
	const search = document.getElementById("problemSearch")?.value.toLowerCase() || "";
	const filtered = problems.filter(p => p.title?.toLowerCase().includes(search));
	const container = document.getElementById("problemListContainer");
	const statsSpan = document.getElementById("problemStats");
	if(statsSpan) statsSpan.innerText = `${filtered.length} / ${problems.length} 题`;
	if(!container) return;
	if(filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;">📭 暂无题目</div>'; return; }
	container.innerHTML = filtered.map((p, idx) => {
		const globalIdx = problems.findIndex(pp => pp === p);
		return `<div class="problem-card">
			<div class="problem-title" ${escapeHtml(p.title)}</div>
			<div class="problem-desc" style="font-size:0.85rem; color:#475569;">${escapeHtml(p.desc?.substring(0,100) || '')}</div>
			<div class="answer-area">
				<input type="text" class="answer-input" id="ansInput_${globalIdx}" placeholder="输入你的答案">
				<button class="btn-sm" onclick="checkAnswer(${globalIdx})">✓ 对答案</button>
				<span id="result_${globalIdx}" class="result-badge"></span>
			</div>
			${canManage() ? `<div style="margin-top:10px;"><button class="btn-sm" onclick="editProblem(${globalIdx})">✏️ 编辑</button> <button class="btn-sm btn-danger" onclick="deleteProblem(${globalIdx})">🗑️ 删除</button></div>` : ''}
		</div>`;
	}).join("");
}

window.checkAnswer = (idx) => {
	const userAns = document.getElementById(`ansInput_${idx}`)?.value.trim().toLowerCase() || "";
	const correct = problems[idx]?.answer?.trim().toLowerCase() || "";
	const resultSpan = document.getElementById(`result_${idx}`);
	if(userAns === correct) { resultSpan.innerText = "正确"; resultSpan.className = "result-badge result-correct"; }
	else { resultSpan.innerText = " 错误"; resultSpan.className = "result-badge result-wrong"; }
};

function renderManageProblems() {
	const container = document.getElementById("manageProblemList");
	if(!container) return;
	if(problems.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;">暂无题目</div>'; return; }
	container.innerHTML = problems.map((p, idx) => `<div style="background:#fafcff; border:1px solid #e2e8f0; border-radius:16px; padding:12px; margin-bottom:12px;"><div><strong>${escapeHtml(p.title)}</strong></div><div style="font-size:0.75rem;">${escapeHtml(p.desc?.substring(0,80))}</div><div style="margin-top:8px;"><button class="btn-sm" onclick="editProblem(${idx})">编辑</button> <button class="btn-sm btn-danger" onclick="deleteProblem(${idx})">删除</button></div></div>`).join("");
}

function renderUsers() {
	const search = document.getElementById("userSearch")?.value.toLowerCase() || "";
	const filtered = users.filter(u => u.username.toLowerCase().includes(search));
	const tbody = document.getElementById("userTableBody");
	if(!tbody) return;
	tbody.innerHTML = filtered.map(u => `<tr><td><strong>${escapeHtml(u.username)}</strong></td><td><span class="role-badge role-${u.role}">${u.role==='root'?'超级管理员':(u.role==='admin'?'管理员':'普通用户')}</span></td><td>${canDeleteUser(u) ? `<button class="btn-sm" onclick="openResetPwd('${u.username}')">重置密码</button> <button class="btn-sm btn-danger" onclick="deleteUser('${u.username}')">删除</button>` : '—'}</td></tr>`).join("");
}

window.editProblem = (idx) => { const p=problems[idx]; document.getElementById("problemModalTitle").innerText="编辑题目"; document.getElementById("problemTitle").value=p.title; document.getElementById("problemDesc").value=p.desc||""; document.getElementById("problemAnswer").value=p.answer||""; document.getElementById("problemModal").dataset.editIdx=idx; document.getElementById("problemModal").style.display="flex"; };
window.deleteProblem = async (idx) => { if(confirm("删除题目？")){ problems.splice(idx,1); await saveProblems(); renderProblems(); renderManageProblems(); } };
async function saveProblemHandler() { const title=document.getElementById("problemTitle").value.trim(); if(!title) return alert("请输入标题"); const desc=document.getElementById("problemDesc").value; const ans=document.getElementById("problemAnswer").value; const editIdx=document.getElementById("problemModal").dataset.editIdx; if(editIdx!==undefined){ problems[editIdx]={title,desc,answer:ans}; delete document.getElementById("problemModal").dataset.editIdx; }else{ problems.push({title,desc,answer:ans}); } await saveProblems(); document.getElementById("problemModal").style.display="none"; renderProblems(); renderManageProblems(); }
async function addUserHandler() { const username=document.getElementById("newUsername").value.trim(); const pwd=document.getElementById("newUserPassword").value; const role=document.getElementById("newUserRoleSelect").value; if(!username||!pwd) return alert("请填写完整"); if(users.find(u=>u.username===username)) return alert("用户已存在"); users.push({username,password:pwd,role}); await saveUsers(); renderUsers(); document.getElementById("userModal").style.display="none"; }
window.deleteUser = async (username) => { if(username==="root") return alert("不能删除root"); if(confirm(`删除 ${username}?`)){ users=users.filter(u=>u.username!==username); await saveUsers(); renderUsers(); } };
let resetTarget=null; window.openResetPwd=(un)=>{ resetTarget=un; document.getElementById("resetUsernameSpan").innerText=un; document.getElementById("resetNewPassword").value=""; document.getElementById("resetPwdModal").style.display="flex"; };
async function doResetPwd(){ const newPwd=document.getElementById("resetNewPassword").value; if(!newPwd) return; const idx=users.findIndex(u=>u.username===resetTarget); if(idx!==-1){ users[idx].password=newPwd; await saveUsers(); alert("密码已重置"); document.getElementById("resetPwdModal").style.display="none"; renderUsers(); } }
async function importProblems(jsonStr){ try{ const data=JSON.parse(jsonStr); let arr=[]; if(data.contests && Array.isArray(data.contests)) arr=data.contests.map(c=>({title:c.title||"",desc:c.desc||"",answer:c.answer||""})); else if(Array.isArray(data)) arr=data; else throw new Error("格式错误"); problems.push(...arr); await saveProblems(); renderProblems(); renderManageProblems(); alert(`导入 ${arr.length} 题`); }catch(e){ alert("导入失败:"+e.message); } }

async function doLogin() {
	const un = document.getElementById("loginUsername").value.trim();
	const pw = document.getElementById("loginPassword").value;
	if(!un||!pw) return;
	if(!GITHUB_TOKEN || GITHUB_TOKEN==="YOUR_GITHUB_TOKEN_HERE") return alert("请先在代码第14行填写 GitHub Token");
	if(!REPO_NAME || REPO_NAME==="用户名/仓库名") return alert("请先在代码第15行填写仓库名，格式: 用户名/仓库名");
	try {
		await initRepo();
		const user = users.find(u=>u.username===un && u.password===pw);
		if(!user) return alert("用户名或密码错误");
		currentUser = user;
		if(un==="root" && pw==="123456"){ alert("首次登录请修改密码"); document.getElementById("pwdModal").style.display="flex"; return; }
		showMainApp();
	} catch(e){ alert("登录失败:"+e.message); }
}

async function changePassword() {
	const np = document.getElementById("newPwd").value; const cp = document.getElementById("confirmPwd").value;
	if(!np || np.length<3) return alert("密码至少3位");
	if(np!==cp) return alert("两次密码不一致");
	const idx = users.findIndex(u=>u.username===currentUser.username);
	if(idx!==-1){ users[idx].password=np; await saveUsers(); currentUser.password=np; alert("密码修改成功"); document.getElementById("pwdModal").style.display="none"; showMainApp(); }
}

function showMainApp() {
	document.getElementById("loginPage").style.display="none";
	document.getElementById("appPage").style.display="block";
	document.getElementById("currentUserName").innerText=currentUser.username;
	const badge = document.getElementById("currentRoleBadge");
	badge.innerText = currentUser.role==='root'?'超级管理员':(currentUser.role==='admin'?'管理员':'普通用户');
	badge.className = `role-badge role-${currentUser.role}`;
	const adminOnly = document.querySelectorAll(".admin-only");
	if(currentUser.role==='root'||currentUser.role==='admin') adminOnly.forEach(el=>el.classList.remove("hidden"));
	else adminOnly.forEach(el=>el.classList.add("hidden"));
	renderProblems(); renderManageProblems(); renderUsers();
}
function logout(){ currentUser=null; document.getElementById("loginPage").style.display="flex"; document.getElementById("appPage").style.display="none"; }

// 绑定事件
window.addEventListener("DOMContentLoaded",()=>{
	document.getElementById("loginBtn").onclick=doLogin;
	document.getElementById("logoutBtn").onclick=logout;
	document.getElementById("changePwdBtn").onclick=()=>{ document.getElementById("pwdModal").style.display="flex"; };
	document.getElementById("confirmPwdBtn").onclick=changePassword;
	document.getElementById("addProblemBtn").onclick=()=>{ document.getElementById("problemModalTitle").innerText="添加题目"; document.getElementById("problemTitle").value=""; document.getElementById("problemDesc").value=""; document.getElementById("problemAnswer").value=""; delete document.getElementById("problemModal").dataset.editIdx; document.getElementById("problemModal").style.display="flex"; };
	document.getElementById("saveProblemModalBtn").onclick=saveProblemHandler;
	document.getElementById("addUserBtn").onclick=()=>{ document.getElementById("userModalTitle").innerText="添加用户"; document.getElementById("newUsername").value=""; document.getElementById("newUserPassword").value=""; document.getElementById("newUserRoleSelect").value="user"; document.getElementById("userModal").style.display="flex"; };
	document.getElementById("saveUserModalBtn").onclick=addUserHandler;
	document.getElementById("doResetPwdBtn").onclick=doResetPwd;
	document.getElementById("importBtn").onclick=()=>{ document.getElementById("importModal").style.display="flex"; };
	document.getElementById("doImportBtn").onclick=async()=>{ const json=document.getElementById("importJson").value; if(json) await importProblems(json); document.getElementById("importModal").style.display="none"; };
	const dropZone=document.getElementById("dropZone"); if(dropZone){ dropZone.ondragover=e=>{e.preventDefault(); dropZone.classList.add("drag-over");}; dropZone.ondragleave=()=>dropZone.classList.remove("drag-over"); dropZone.ondrop=async e=>{ e.preventDefault(); dropZone.classList.remove("drag-over"); const file=e.dataTransfer.files[0]; if(file && file.name.endsWith(".json")){ const text=await file.text(); await importProblems(text); document.getElementById("importModal").style.display="none"; }else alert("请拖入 .json 文件"); }; }
	document.getElementById("problemSearch").oninput=()=>renderProblems();
	document.getElementById("userSearch").oninput=()=>renderUsers();
	document.querySelectorAll(".nav-tab").forEach(tab=>{ tab.onclick=()=>{ const target=tab.dataset.tab; document.querySelectorAll(".tab-content").forEach(el=>el.classList.add("hidden")); document.getElementById(target).classList.remove("hidden"); document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active")); tab.classList.add("active"); if(target==="problemMgmt") renderManageProblems(); if(target==="users") renderUsers(); }; });
	document.querySelectorAll(".close").forEach(close=>{ close.onclick=()=>{ const modal=close.closest(".modal"); if(modal) modal.style.display="none"; }; });
	window.onclick=e=>{ if(e.target.classList && e.target.classList.contains("modal")) e.target.style.display="none"; };
});
</script>
</body>
</html>
